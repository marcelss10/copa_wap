  :root {
    --verde: #00A86B;
    --amarelo: #F5D800;
    --bg: #07111F;
    --bg2: #0D1E33;
    --card: #112540;
    --txt: #EDF2F8;

    --border: rgba(255,255,255,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; }

  header {
    background: var(--bg2);
    border-bottom: 3px solid var(--verde);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-block {
    background: var(--verde);
    border-radius: 6px;
    padding: 6px 13px;
    line-height: 1.2;
    text-align: center;
  }
  .logo-wap { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: #fff; letter-spacing: 0.04em; }
  .logo-waaw { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.09em; color: rgba(255,255,255,0.8); white-space: nowrap; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 0.03em; line-height: 1.1; }
  .header-title em { color: var(--amarelo); font-style: normal; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; }
  .legend { display: flex; gap: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .leg { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-dot.com { background: var(--amarelo); }
  .leg-dot.out { background: var(--muted); opacity: 0.5; }

  .tabs-wrap { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none; border: none; border-bottom: 3px solid transparent;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 13px 16px 10px; cursor: pointer; white-space: nowrap;
    transition: color .15s, border-color .15s; position: relative;
  }
  .tab-btn:hover { color: var(--txt); }
  .tab-btn.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
  .tab-btn.has-com::after { content: ''; position: absolute; top: 9px; right: 8px; width: 5px; height: 5px; background: var(--verde); border-radius: 50%; }
  .tab-btn.hoje { color: #5DE8A8; }
  .tab-btn.hoje.active { color: var(--amarelo); }

  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
  .day-section { display: none; }
  .day-section.active { display: block; }

  .day-hdr { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .day-title { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; line-height: 1; }
  .day-title .dnum { color: var(--amarelo); font-size: 60px; margin-right: 6px; }
  .day-round { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--verde); margin-top: 5px; }
  .day-com-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(245,216,0,0.1); border: 1px solid rgba(245,216,0,0.25); border-radius: 24px; padding: 5px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--amarelo); letter-spacing: 0.05em; margin-bottom: 4px; }

  .games-list { display: flex; flex-direction: column; gap: 12px; }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 5px solid transparent;
    border-radius: 10px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 88px 1fr 200px;
    align-items: center;
    gap: 20px;
    transition: transform .12s;
  }
  .game-card:hover { transform: translateX(4px); }
  .game-card.com { border-left-color: var(--amarelo); background: linear-gradient(100deg, rgba(245,216,0,0.055) 0%, var(--card) 45%); }
  .game-card.out { border-left-color: rgba(255,255,255,0.13); opacity: 0.52; }
  .game-card.live { border-left-color: #FF4040 !important; background: linear-gradient(100deg, rgba(255,64,64,0.08) 0%, var(--card) 50%) !important; opacity: 1 !important; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,64,64,0.25)} 50%{box-shadow:0 0 0 8px rgba(255,64,64,0)} }

  .col-time { text-align: center; }
  .time-big { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; line-height: 1; }
  .game-card.com  .time-big { color: var(--amarelo); }
  .game-card.out  .time-big { color: var(--muted); }
  .game-card.live .time-big { color: #FF7777; }
  .time-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  .col-match {}
  .match-teams { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 9px; }

  /* Team block: flag + name side by side */
  .team {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 23px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .team.brasil { color: var(--verde); }
  /* Flag rendered as image via country-flag-emoji-polyfill or just a styled span */
  .flag {
    display: inline-block;
    font-size: 28px;
    line-height: 1;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  }

  .vs-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); padding: 0 2px; flex-shrink: 0; }
  .match-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .meta-grp { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(255,255,255,0.06); border-radius: 4px; padding: 3px 8px; color: var(--muted); }
  .meta-city { font-size: 13px; color: var(--muted); }

  /* COUNTDOWN COLUMN */
  .col-cd { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
  .badge-com { display: inline-block; background: var(--amarelo); color: #07111F; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; }
  .badge-live { display: inline-flex; align-items: center; gap: 5px; background: #FF4040; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; animation: blink 1.1s steps(1) infinite; }
  .live-dot { width: 7px; height: 7px; background: #fff; border-radius: 50%; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .cd-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 16px; text-align: center; min-width: 128px; }
  .cd-num { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: 0.02em; }
  .cd-num.far    { color: var(--txt); }
  .cd-num.soon   { color: #5DE8A8; }
  .cd-num.urgent { color: #FF9944; }
  .cd-num.done   { color: var(--muted); font-size: 15px; }
  .cd-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  footer { text-align: center; padding: 22px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); line-height: 2; }
  footer .dev { font-size: 11px; color: rgba(122,143,168,0.5); }

  @media (max-width: 750px) {
    .game-card { grid-template-columns: 68px 1fr; }
    .col-cd { display: none; }
    .team { font-size: 17px; }
    .flag { font-size: 22px; }
  }
</style>

function kickoff(g) {
  const [y,mo,d] = g.date.split('-').map(Number);
  return new Date(Date.UTC(y, mo-1, d, g.h+3, g.min, 0));
}
const GAME_DUR = 115*60*1000;

function brasiliaToday() {
  return new Date(Date.now() - 3*3600*1000).toISOString().slice(0,10);

  const fl = teams[name] || '🏳️';

}

// ── COUNTDOWN ──────────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmtCd(ms){
  if(ms<=0) return null;
  const s=Math.floor(ms/1000), dd=Math.floor(s/86400),
        hh=Math.floor((s%86400)/3600), mm=Math.floor((s%3600)/60), ss=s%60;
  if(dd>0)  return {text:`${dd}d ${pad(hh)}h`,     cls:'far'};
  if(hh>=2) return {text:`${hh}h ${pad(mm)}m`,     cls:'far'};
  if(hh>=1) return {text:`${hh}h ${pad(mm)}m ${pad(ss)}s`, cls:'soon'};
  if(mm>0)  return {text:`${mm}m ${pad(ss)}s`,     cls:'soon'};
  return      {text:`${ss}s`,                       cls:'urgent'};
}

function tick(){
  const now = Date.now();
  games.forEach(g => {
    const nEl = document.getElementById('cdnum-'+g.id);
    const lEl = document.getElementById('cdlbl-'+g.id);
    const cEl = document.getElementById('card-'+g.id);
    const dEl = document.getElementById('colcd-'+g.id);
    if(!nEl) return;
    const k = kickoff(g).getTime();
    const toStart = k - now, toEnd = k + GAME_DUR - now;
    if(toStart > 0){
      const f = fmtCd(toStart);
      nEl.textContent = f.text; nEl.className = 'cd-num '+f.cls;
      lEl.textContent = 'para o início';
      cEl.classList.remove('live');
    } else if(toEnd > 0){
      nEl.textContent = 'AO VIVO'; nEl.className = 'cd-num urgent';
      lEl.textContent = 'em andamento';
      cEl.classList.add('live');
      if(!dEl.querySelector('.badge-live')){
        const bl = document.createElement('span');
        bl.className = 'badge-live';
        bl.innerHTML = '<span class="live-dot"></span> AO VIVO';
        dEl.insertBefore(bl, dEl.firstChild);
        const bc = dEl.querySelector('.badge-com');
        if(bc) bc.remove();
      }
    } else {
      nEl.textContent = 'Encerrado'; nEl.className = 'cd-num done';
      lEl.textContent = '';
      cEl.classList.remove('live');
    }
  });
}
tick();
setInterval(tick, 1000);

function switchTab(date){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.date===date));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id==='section-'+date));
  const b = document.querySelector(`.tab-btn[data-date="${date}"]`);
  if(b) b.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}
