    --verde-escuro: #007A4D;
    --amarelo: #F5D800;
    --azul-escuro: #0A1628;
    --azul-medio: #112240;
    --azul-card: #162D4A;
    --texto: #E8EDF4;
    --texto-muted: #8899AA;
    --border: rgba(255,255,255,0.08);
    --commercial-glow: rgba(245,216,0,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background-color: var(--azul-escuro);
    color: var(--texto);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--azul-medio);
    border-bottom: 2px solid var(--verde);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-badge {
    background: var(--verde);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border-radius: 4px;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .header-title span {
    color: var(--amarelo);
  }

  .legend-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .leg-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .leg-dot.commercial { background: var(--amarelo); }
  .leg-dot.outside { background: var(--texto-muted); }

  /* ── TABS ── */
  .tabs-bar {
    background: var(--azul-medio);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--texto-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 14px 9px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s, border-color .2s;
  }
  .tab-btn:hover { color: var(--texto); }
  .tab-btn.active {
    color: var(--amarelo);
    border-bottom-color: var(--amarelo);
  }
  .tab-btn.has-comercial::after {
    content: '●';
    font-size: 7px;
    vertical-align: super;
    margin-left: 4px;
    color: var(--verde);
  }

  /* ── MAIN ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── DAY SECTION ── */
  .day-section { display: none; }
  .day-section.active { display: block; }

  .day-header {
    margin-bottom: 16px;
  }
  .day-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .day-header h2 .dia-num {
    color: var(--amarelo);
    font-size: 48px;
    margin-right: 4px;
  }
  .day-header .rodada-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--verde);
    margin-top: 4px;
  }
  .day-comercial-summary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245,216,0,0.12);
    border: 1px solid rgba(245,216,0,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--amarelo);
    margin-top: 8px;
  }

  /* ── GAME CARD ── */
  .games-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 40px;
  }

  .game-card {
    background: var(--azul-card);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: 8px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 16px;
    position: relative;
    transition: transform .15s, box-shadow .15s;
  }
  .game-card:hover {
    transform: translateX(3px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .game-card.commercial {
    border-left-color: var(--amarelo);
    background: linear-gradient(135deg, rgba(245,216,0,0.06) 0%, var(--azul-card) 50%);
  }
  .game-card.outside {
    border-left-color: var(--texto-muted);
    opacity: 0.65;
  }

  .game-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    text-align: center;
  }
  .game-card.commercial .game-time { color: var(--amarelo); }
  .game-card.outside .game-time { color: var(--texto-muted); }

  .game-time-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-muted);
    text-align: center;
    margin-top: 2px;
  }

  .game-match {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .game-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .game-teams .vs {
    font-size: 13px;
    font-weight: 600;
    color: var(--texto-muted);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .team-brasil {
    color: var(--verde);
  }

  .game-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .game-group {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--texto-muted);
  }
  .game-city {
    font-size: 12px;
    color: var(--texto-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .game-city svg { opacity: 0.5; }

  .badge-comercial {
    background: var(--amarelo);
    color: var(--azul-escuro);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .game-right {
    text-align: right;
    min-width: 90px;
  }
  .game-right .badge-comercial { display: inline-block; margin-bottom: 6px; }
  .fora-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--texto-muted);

    text-align: center;
    padding: 60px 20px;
    color: var(--texto-muted);

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--texto-muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .game-card {
      grid-template-columns: 56px 1fr;
    }
    .game-right { display: none; }
    .game-teams { font-size: 17px; }
    header { padding: 14px 16px; }
    .header-title { font-size: 17px; }
  }
</style>
</head>

const byDate = {};
games.forEach(g => {
  if (!byDate[g.date]) byDate[g.date] = [];
  byDate[g.date].push(g);
});

const dateLabels = {
  '2026-06-11':'Qui 11',
  '2026-06-12':'Sex 12',
  '2026-06-13':'Sáb 13',
  '2026-06-14':'Dom 14',
  '2026-06-15':'Seg 15',
  '2026-06-16':'Ter 16',
  '2026-06-17':'Qua 17',
  '2026-06-18':'Qui 18',
  '2026-06-19':'Sex 19',
  '2026-06-20':'Sáb 20',
  '2026-06-21':'Dom 21',
  '2026-06-22':'Seg 22',
  '2026-06-23':'Ter 23',
  '2026-06-24':'Qua 24',
  '2026-06-25':'Qui 25',
  '2026-06-26':'Sex 26',
  '2026-06-27':'Sáb 27',
};

const roundLabel = {1:'1ª Rodada',2:'2ª Rodada',3:'3ª Rodada'};

const tabsBar = document.getElementById('tabsBar');
const mainContent = document.getElementById('mainContent');
const today = new Date().toISOString().slice(0,10);

const sortedDates = Object.keys(byDate).sort();
let activeTab = sortedDates.includes(today) ? today : sortedDates[0];

sortedDates.forEach(date => {
  const dayGames = byDate[date];
  const comercialCount = dayGames.filter(g => isComercial(g.h)).length;
  const label = dateLabels[date] || date.slice(8);

  // Tab
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (comercialCount > 0 ? ' has-comercial' : '');
  btn.dataset.date = date;
  btn.textContent = label;
  if (date === activeTab) btn.classList.add('active');
  btn.addEventListener('click', () => switchTab(date));
  tabsBar.appendChild(btn);

  // Section
  const section = document.createElement('div');
  section.className = 'day-section' + (date === activeTab ? ' active' : '');
  section.id = 'section-' + date;

  const [y, m, d] = date.split('-');
  const months = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const weekDays = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const wd = new Date(date + 'T12:00:00').getDay();

  const rounds = [...new Set(dayGames.map(g => g.round))].sort();

  let headerHtml = `
    <div class="day-header">
      <h2><span class="dia-num">${d}</span>${months[parseInt(m)]} 2026</h2>
      <div class="rodada-label">${weekDays[wd]} · ${rounds.map(r=>roundLabel[r]).join(' & ')}</div>
  `;
  if (comercialCount > 0) {
    headerHtml += `<div class="day-comercial-summary">⚡ ${comercialCount} jogo${comercialCount>1?'s':''} no horário comercial</div>`;
  }
  headerHtml += `</div>`;

  let gamesHtml = '<div class="games-list">';
  dayGames.forEach(g => {
    const com = isComercial(g.h);
    const t1IsBrasil = isBrasil(g.team1);
    const t2IsBrasil = isBrasil(g.team2);
    gamesHtml += `
      <div class="game-card ${com ? 'commercial' : 'outside'}">
        <div>
          <div class="game-time">${g.label}</div>
          <div class="game-time-label">Brasília</div>
        </div>
        <div class="game-match">
          <div class="game-teams">
            <span class="${t1IsBrasil ? 'team-brasil' : ''}">${flag(g.team1)} ${g.team1}</span>
            <span class="vs">vs</span>
            <span class="${t2IsBrasil ? 'team-brasil' : ''}">${flag(g.team2)} ${g.team2}</span>
          </div>
          <div class="game-meta">
            <span class="game-group">Grupo ${g.group}</span>
            <span class="game-city">
              <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 7 5 7s5-3.25 5-7c0-2.76-2.24-5-5-5zm0 6.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/></svg>
              ${g.city}
            </span>
          </div>
        </div>
        <div class="game-right">
          ${com
            ? '<span class="badge-comercial">Comercial</span>'
            : '<span class="fora-badge">Fora</span>'
          }
        </div>
      </div>
    `;
  });
  gamesHtml += '</div>';

  section.innerHTML = headerHtml + gamesHtml;
  mainContent.appendChild(section);
});

function switchTab(date) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.date === date));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + date));
  // scroll tab into view
  const btn = document.querySelector(`.tab-btn[data-date="${date}"]`);
  if (btn) btn.scrollIntoView({block:'nearest', inline:'center', behavior:'smooth'});
}
</script>
</body>
</html>
