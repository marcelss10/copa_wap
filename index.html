<style>
  :root {
    --verde: #00A86B;
    --verde-escuro: #007A4D;
    --amarelo: #F5D800;
    --azul-escuro: #0A1628;
    --azul-medio: #112240;
    --azul-card: #162D4A;
    --texto: #E8EDF4;
    --texto-muted: #8899AA;
    --border: rgba(255,255,255,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background-color: var(--azul-escuro);
    color: var(--texto);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--azul-medio);
    border-bottom: 2px solid var(--verde);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 16px; }

  .logo-badge {
    background: var(--verde);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    border-radius: 4px;
    line-height: 1.3;
    text-align: center;
  }
  .logo-badge .sub {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    opacity: 0.85;
    margin-top: 1px;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .header-title span { color: var(--amarelo); }

  .legend-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .leg { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.commercial { background: var(--amarelo); }
  .leg-dot.outside { background: var(--texto-muted); }

  /* ── TABS ── */
  .tabs-bar {
    background: var(--azul-medio);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--texto-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 14px 9px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s, border-color .2s;
  }
  .tab-btn:hover { color: var(--texto); }
  .tab-btn.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
  .tab-btn.has-comercial::after {
    content: '●';
    font-size: 7px;
    vertical-align: super;
    margin-left: 4px;
    color: var(--verde);
  }

  /* ── MAIN ── */
  main { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

  .day-section { display: none; }
  .day-section.active { display: block; }

  .day-header { margin-bottom: 16px; }
  .day-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .day-header h2 .dia-num { color: var(--amarelo); font-size: 48px; margin-right: 4px; }
  .day-header .rodada-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--verde);
    margin-top: 4px;
  }
  .day-comercial-summary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245,216,0,0.12);
    border: 1px solid rgba(245,216,0,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--amarelo);
    margin-top: 8px;
  }

  /* ── GAME CARD ── */
  .games-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 40px;
  }

  .game-card {
    background: var(--azul-card);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: 8px;
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 16px;
    transition: transform .15s, box-shadow .15s;
  }
  .game-card:hover { transform: translateX(3px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

  .game-card.commercial {
    border-left-color: var(--amarelo);
    background: linear-gradient(135deg, rgba(245,216,0,0.06) 0%, var(--azul-card) 50%);
  }
  .game-card.outside { border-left-color: var(--texto-muted); opacity: 0.65; }

  .game-card.ao-vivo {
    border-left-color: #FF4444 !important;
    background: linear-gradient(135deg, rgba(255,68,68,0.08) 0%, var(--azul-card) 60%) !important;
    opacity: 1 !important;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(255,68,68,0); }
  }

  .game-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    text-align: center;
  }
  .game-card.commercial .game-time { color: var(--amarelo); }
  .game-card.outside .game-time { color: var(--texto-muted); }
  .game-card.ao-vivo .game-time { color: #FF6666; }

  .game-time-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-muted);
    text-align: center;
    margin-top: 2px;
  }

  .game-match { display: flex; flex-direction: column; gap: 2px; }
  .game-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .game-teams .vs {
    font-size: 13px;
    font-weight: 600;
    color: var(--texto-muted);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .team-brasil { color: var(--verde); }

  .game-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .game-group {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--texto-muted);
  }
  .game-city {
    font-size: 12px;
    color: var(--texto-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── COUNTDOWN ── */
  .game-right { text-align: right; min-width: 100px; }

  .badge-comercial {
    background: var(--amarelo);
    color: var(--azul-escuro);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
    display: inline-block;
    margin-bottom: 5px;

  .fora-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--texto-muted);

  .ao-vivo-badge {
    background: #FF4444;
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 5px;
    animation: blink 1.2s steps(1) infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .countdown {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--texto);
    line-height: 1.2;
  }
  .countdown.urgent { color: #FF9944; }
  .countdown.soon { color: var(--verde); }
  .countdown.done { color: var(--texto-muted); font-size: 11px; }

  .countdown-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-muted);

  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--texto-muted);
    border-top: 1px solid var(--border);
    line-height: 1.8;

  footer .dev-credit {

    color: rgba(136,153,170,0.6);
    margin-top: 2px;

  @media (max-width: 600px) {
    .game-card { grid-template-columns: 56px 1fr; }
    .game-right { display: none; }
    .game-teams { font-size: 17px; }
    header { padding: 14px 16px; }
    .header-title { font-size: 17px; }
  }
</style>
</head>

  {date:'2026-06-25',h:23,min:0,label:'23h',team1:'Paraguai',team2:'Austrália',city:'San Francisco',group:'D',round:3},
  // 26 jun
  {date:'2026-06-26',h:16,min:0,label:'16h',team1:'Noruega',team2:'França',city:'Boston',group:'I',round:3},
  {date:'2026-06-26',h:16,min:0,label:'16h',team1:'Senegal',team2:'Rep. Mundial 2',city:'Toronto',group:'I',round:3},
  {date:'2026-06-26',h:21,min:0,label:'21h',team1:'Cabo Verde',team2:'Arábia Saudita',city:'Houston',group:'H',round:3},
  {date:'2026-06-26',h:21,min:0,label:'21h',team1:'Uruguai',team2:'Espanha',city:'Guadalajara',group:'H',round:3},
  // 27 jun
  {date:'2026-06-27',h:0,min:0,label:'00h',team1:'Egito',team2:'Irã',city:'Seattle',group:'G',round:3},
  {date:'2026-06-27',h:0,min:0,label:'00h',team1:'Nova Zelândia',team2:'Bélgica',city:'Vancouver',group:'G',round:3},
  {date:'2026-06-27',h:18,min:0,label:'18h',team1:'Panamá',team2:'Inglaterra',city:'Nova York/NJ',group:'L',round:3},
  {date:'2026-06-27',h:18,min:0,label:'18h',team1:'Croácia',team2:'Gana',city:'Filadélfia',group:'L',round:3},
  {date:'2026-06-27',h:20,min:30,label:'20:30h',team1:'Colômbia',team2:'Portugal',city:'Miami',group:'K',round:3},
  {date:'2026-06-27',h:20,min:30,label:'20:30h',team1:'Rep. Mundial 1',team2:'Uzbequistão',city:'Atlanta',group:'K',round:3},
  {date:'2026-06-27',h:23,min:0,label:'23h',team1:'Argélia',team2:'Áustria',city:'Kansas City',group:'J',round:3},
  {date:'2026-06-27',h:23,min:0,label:'23h',team1:'Jordânia',team2:'Argentina',city:'Dallas',group:'J',round:3},
];

// Build unique ID per game
games.forEach((g, i) => g.id = 'g' + i);

// Get game kickoff as Date object (assumes Brasília = UTC-3)
function gameKickoff(g) {
  // Parse date as local midnight Brasília (UTC-3)
  const [y, mo, d] = g.date.split('-').map(Number);
  // Create UTC time = Brasília time + 3h
  return new Date(Date.UTC(y, mo - 1, d, g.h + 3, g.min, 0));
}

// Format countdown
function formatCountdown(diffMs) {
  if (diffMs <= 0) return null;
  const totalSec = Math.floor(diffMs / 1000);
  const days = Math.floor(totalSec / 86400);
  const hrs  = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;

  if (days > 0) return { text: `${days}d ${String(hrs).padStart(2,'0')}h`, cls: '' };
  if (hrs > 0)  return { text: `${hrs}h ${String(mins).padStart(2,'0')}m`, cls: hrs < 2 ? 'soon' : '' };
  if (mins > 0) return { text: `${mins}m ${String(secs).padStart(2,'0')}s`, cls: 'urgent' };
  return { text: `${secs}s`, cls: 'urgent' };
}

// Group games by date
const byDate = {};
games.forEach(g => { if (!byDate[g.date]) byDate[g.date] = []; byDate[g.date].push(g); });

const dateLabels = {
  '2026-06-11':'Qui 11','2026-06-12':'Sex 12','2026-06-13':'Sáb 13',
  '2026-06-14':'Dom 14','2026-06-15':'Seg 15','2026-06-16':'Ter 16',
  '2026-06-17':'Qua 17','2026-06-18':'Qui 18','2026-06-19':'Sex 19',
  '2026-06-20':'Sáb 20','2026-06-21':'Dom 21','2026-06-22':'Seg 22',
  '2026-06-23':'Ter 23','2026-06-24':'Qua 24','2026-06-25':'Qui 25',
  '2026-06-26':'Sex 26','2026-06-27':'Sáb 27',
};
const roundLabel = {1:'1ª Rodada',2:'2ª Rodada',3:'3ª Rodada'};

const tabsBar = document.getElementById('tabsBar');
const mainContent = document.getElementById('mainContent');

// Brasília "today"
function brasiliaToday() {
  const now = new Date();
  const brt = new Date(now.getTime() - 3 * 60 * 60 * 1000);
  return brt.toISOString().slice(0, 10);
}

const today = brasiliaToday();
const sortedDates = Object.keys(byDate).sort();
let activeTab = sortedDates.includes(today) ? today : sortedDates[0];

// Build DOM
sortedDates.forEach(date => {
  const dayGames = byDate[date];
  const comercialCount = dayGames.filter(g => isComercial(g.h)).length;
  const label = dateLabels[date] || date.slice(8);

  // Tab
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (comercialCount > 0 ? ' has-comercial' : '');
  btn.dataset.date = date;
  btn.textContent = label;
  if (date === activeTab) btn.classList.add('active');
  btn.addEventListener('click', () => switchTab(date));
  tabsBar.appendChild(btn);

  // Section
  const section = document.createElement('div');
  section.className = 'day-section' + (date === activeTab ? ' active' : '');
  section.id = 'section-' + date;

  const [y, m, d] = date.split('-');
  const months = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const weekDays = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const wd = new Date(date + 'T12:00:00').getDay();
  const rounds = [...new Set(dayGames.map(g => g.round))].sort();

  let headerHtml = `
    <div class="day-header">
      <h2><span class="dia-num">${d}</span>${months[parseInt(m)]} 2026</h2>
      <div class="rodada-label">${weekDays[wd]} · ${rounds.map(r=>roundLabel[r]).join(' & ')}</div>
  `;
  if (comercialCount > 0)
    headerHtml += `<div class="day-comercial-summary">⚡ ${comercialCount} jogo${comercialCount>1?'s':''} no horário comercial</div>`;
  headerHtml += `</div>`;

  let gamesHtml = '<div class="games-list">';
  dayGames.forEach(g => {
    const com = isComercial(g.h);
    const t1B = isBrasil(g.team1), t2B = isBrasil(g.team2);
    gamesHtml += `
      <div class="game-card ${com ? 'commercial' : 'outside'}" id="card-${g.id}">
        <div>
          <div class="game-time">${g.label}</div>
          <div class="game-time-label">Brasília</div>
        </div>
        <div class="game-match">
          <div class="game-teams">
            <span class="${t1B ? 'team-brasil' : ''}">${flag(g.team1)} ${g.team1}</span>
            <span class="vs">vs</span>
            <span class="${t2B ? 'team-brasil' : ''}">${flag(g.team2)} ${g.team2}</span>
          </div>
          <div class="game-meta">
            <span class="game-group">Grupo ${g.group}</span>
            <span class="game-city">
              <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 7 5 7s5-3.25 5-7c0-2.76-2.24-5-5-5zm0 6.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/></svg>
              ${g.city}
            </span>
          </div>
        </div>
        <div class="game-right" id="right-${g.id}">
          ${com ? '<span class="badge-comercial">Comercial</span><br>' : ''}
          <div class="countdown" id="cd-${g.id}"></div>
          <div class="countdown-label" id="cdlabel-${g.id}"></div>
        </div>
      </div>
    `;
  });
  gamesHtml += '</div>';

  section.innerHTML = headerHtml + gamesHtml;
  mainContent.appendChild(section);
});

// ── COUNTDOWN TICKER ──────────────────────────────────────────────
// Game duration assumed ~115 min (90 + extra time/intervals)
const GAME_DURATION_MS = 115 * 60 * 1000;

function updateCountdowns() {
  const now = new Date();
  games.forEach(g => {
    const cdEl = document.getElementById('cd-' + g.id);
    const labelEl = document.getElementById('cdlabel-' + g.id);
    const cardEl = document.getElementById('card-' + g.id);
    if (!cdEl) return;

    const kick = gameKickoff(g);
    const diffToStart = kick - now;
    const diffToEnd = (kick.getTime() + GAME_DURATION_MS) - now;

    if (diffToStart > 0) {
      // Upcoming
      const fmt = formatCountdown(diffToStart);
      cdEl.textContent = fmt.text;
      cdEl.className = 'countdown ' + (fmt.cls || '');
      labelEl.textContent = 'para o início';
      cardEl.classList.remove('ao-vivo');
    } else if (diffToEnd > 0) {
      // Ao vivo (aproximado)
      cdEl.textContent = '● AO VIVO';
      cdEl.className = 'countdown';
      cdEl.style.color = '#FF6666';
      labelEl.textContent = 'em andamento';
      cardEl.classList.add('ao-vivo');
      // Inject ao vivo badge if not there
      const rightEl = document.getElementById('right-' + g.id);
      if (rightEl && !rightEl.querySelector('.ao-vivo-badge')) {
        const bEl = document.createElement('span');
        bEl.className = 'ao-vivo-badge';
        bEl.textContent = '🔴 AO VIVO';
        rightEl.insertBefore(bEl, rightEl.firstChild);
      }
    } else {
      // Finished
      cdEl.textContent = 'Encerrado';
      cdEl.className = 'countdown done';
      labelEl.textContent = '';
      cardEl.classList.remove('ao-vivo');
    }
  });
}

updateCountdowns();
setInterval(updateCountdowns, 1000);

function switchTab(date) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.date === date));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + date));
  const btn = document.querySelector(`.tab-btn[data-date="${date}"]`);
  if (btn) btn.scrollIntoView({block:'nearest', inline:'center', behavior:'smooth'});
}
</script>
