<head>
<meta charset="UTF-8">

<style>
  :root {
    --verde: #00A86B;
    --amarelo: #F5D800;
    --azul-escuro: #07111F;
    --azul-medio: #0D1E33;
    --azul-card: #112540;
    --azul-card2: #0F2038;
    --texto: #EDF2F8;
    --texto-muted: #7A8FA8;
    --border: rgba(255,255,255,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--azul-escuro);
    color: var(--texto);
    min-height: 100vh;
    font-size: 16px;
  }

  /* HEADER */
  header {
    background: var(--azul-medio);
    border-bottom: 3px solid var(--verde);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--verde);
    border-radius: 6px;
    padding: 6px 14px;
    line-height: 1.2;
  }
  .logo-wap {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: #fff;
  }
  .logo-waaw {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.09em;
    color: rgba(255,255,255,0.82);
    white-space: nowrap;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.03em;
    line-height: 1.1;
  }
  .header-title em { color: var(--amarelo); font-style: normal; }
  .header-sub { font-size: 12px; color: var(--texto-muted); margin-top: 3px; letter-spacing: 0.04em; }

  .legend {
    display: flex;
    gap: 22px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .leg { display: flex; align-items: center; gap: 8px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-dot.com { background: var(--amarelo); }
  .leg-dot.out { background: var(--texto-muted); opacity: 0.5; }

  /* TABS */
  .tabs-wrap {
    background: var(--azul-medio);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--texto-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 13px 16px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    position: relative;
  }
  .tab-btn:hover { color: var(--texto); }
  .tab-btn.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }
  .tab-btn.has-com::after {
    content: '';
    position: absolute;
    top: 9px; right: 8px;
    width: 5px; height: 5px;
    background: var(--verde);
    border-radius: 50%;
  }
  .tab-btn.today-tab {
    color: var(--verde);
  }
  .tab-btn.today-tab.active { color: var(--amarelo); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

  .day-section { display: none; }
  .day-section.active { display: block; }

  /* DAY HEADER */
  .day-hdr {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .day-hdr-left {}
  .day-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .day-title .dnum { color: var(--amarelo); font-size: 60px; margin-right: 6px; }
  .day-round {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--verde);
    margin-top: 5px;
  }
  .day-com-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(245,216,0,0.1);
    border: 1px solid rgba(245,216,0,0.25);
    border-radius: 24px;
    padding: 5px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--amarelo);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  /* GAME CARD вҖ” TV SIZED */
  .games-list { display: flex; flex-direction: column; gap: 12px; }

  .game-card {
    background: var(--azul-card);
    border: 1px solid var(--border);
    border-left: 5px solid transparent;
    border-radius: 10px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 90px 1fr 220px;
    align-items: center;
    gap: 20px;
    transition: transform .12s;
  }
  .game-card:hover { transform: translateX(4px); }
  .game-card.com {
    border-left-color: var(--amarelo);
    background: linear-gradient(100deg, rgba(245,216,0,0.055) 0%, var(--azul-card) 45%);
  }
  .game-card.out {
    border-left-color: rgba(255,255,255,0.15);
    opacity: 0.55;
  }
  .game-card.live {
    border-left-color: #FF4040 !important;
    background: linear-gradient(100deg, rgba(255,64,64,0.08) 0%, var(--azul-card) 50%) !important;
    opacity: 1 !important;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,64,64,0.25); }
    50% { box-shadow: 0 0 0 8px rgba(255,64,64,0); }
  }

  .col-time { text-align: center; }
  .time-big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.01em;

  .game-card.com .time-big { color: var(--amarelo); }
  .game-card.out .time-big { color: var(--texto-muted); }
  .game-card.live .time-big { color: #FF6666; }
  .time-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--texto-muted);
    margin-top: 3px;
  }

  .match-teams {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .team {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1;

  .team.brasil { color: var(--verde); }
  .team-flag {
    font-size: 26px;
    line-height: 1;
    display: inline-block;
  }
  .vs-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--texto-muted);
    padding: 0 2px;
    flex-shrink: 0;

  .match-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .meta-group {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--texto-muted);
  }
  .meta-city {
    font-size: 13px;
    color: var(--texto-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meta-city svg { opacity: 0.45; flex-shrink: 0; }

  /* COUNTDOWN COLUMN */
  .col-cd {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  /* Status badge top */
  .badge-com {
    display: inline-block;
    background: var(--amarelo);
    color: #0a1628;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;

  .badge-live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #FF4040;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;

  .live-dot {
    width: 7px; height: 7px;
    background: #fff;
    border-radius: 50%;
  }

  .cd-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    min-width: 130px;
  }
  .cd-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.02em;

  .cd-num.soon   { color: var(--verde); }
  .cd-num.urgent { color: #FF9944; }
  .cd-num.far    { color: var(--texto); }
  .cd-num.done   { color: var(--texto-muted); font-size: 16px; }
  .cd-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--texto-muted);
    margin-top: 3px;

  footer {
    text-align: center;
    padding: 22px 20px;
    font-size: 12px;
    color: var(--texto-muted);
    border-top: 1px solid var(--border);
    line-height: 2;
  }
  footer .dev { font-size: 11px; color: rgba(122,143,168,0.55); margin-top: 2px; }

  @media (max-width: 720px) {
    .game-card { grid-template-columns: 70px 1fr; }
    .col-cd { display: none; }
    .team { font-size: 18px; }
    .team-flag { font-size: 20px; }
    .time-big { font-size: 28px; }
  }
</style>

function pad(n) { return String(n).padStart(2,'0'); }

function fmtCd(ms) {
  if (ms <= 0) return null;
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  if (d > 0)  return { text: `${d}d ${pad(h)}h`,        cls: 'far' };
  if (h >= 2) return { text: `${h}h ${pad(m)}m`,        cls: 'far' };
  if (h >= 1) return { text: `${h}h ${pad(m)}m ${pad(sec)}s`, cls: 'soon' };
  if (m > 0)  return { text: `${m}m ${pad(sec)}s`,      cls: 'urgent' };
  return       { text: `${sec}s`,                        cls: 'urgent' };
}

function tick() {
  const now = Date.now();
  games.forEach(g => {
    const numEl = document.getElementById('cdnum-' + g.id);
    const lblEl = document.getElementById('cdlbl-' + g.id);
    const cardEl = document.getElementById('card-' + g.id);
    const colEl = document.getElementById('colcd-' + g.id);
    if (!numEl) return;

    const k = kickoff(g).getTime();
    const toStart = k - now;
    const toEnd   = k + GAME_DUR - now;

    if (toStart > 0) {
      const fmt = fmtCd(toStart);
      numEl.textContent = fmt.text;
      numEl.className = 'cd-num ' + fmt.cls;
      lblEl.textContent = 'para o inГӯcio';
      cardEl.classList.remove('live');
    } else if (toEnd > 0) {
      numEl.textContent = 'AO VIVO';
      numEl.className = 'cd-num urgent';
      lblEl.textContent = 'em andamento';
      cardEl.classList.add('live');
      if (!colEl.querySelector('.badge-live')) {
        const bl = document.createElement('span');
        bl.className = 'badge-live';
        bl.innerHTML = '<span class="live-dot"></span> AO VIVO';
        colEl.insertBefore(bl, colEl.firstChild);
        const bc = colEl.querySelector('.badge-com');
        if (bc) bc.remove();
      }
    } else {
      numEl.textContent = 'Encerrado';
      numEl.className = 'cd-num done';
      lblEl.textContent = '';
      cardEl.classList.remove('live');
    }
  });
}
tick();
setInterval(tick, 1000);

function switchTab(date) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.date===date));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id==='section-'+date));
  const b = document.querySelector(`.tab-btn[data-date="${date}"]`);
  if (b) b.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}
